name: Deploy server

# The client deploys via Cloudflare Workers Builds (Path: client).
# The PartyKit server deploys here, to PartyKit's platform, on every push
# to main — keeping the "main auto-deploys" promise for both halves.

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "package-lock.json"
      - ".github/workflows/deploy-server.yml"

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    name: partykit deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy PartyKit server
        run: npm run deploy --workspace server
        env:
          PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
