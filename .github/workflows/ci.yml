name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (client + server)
        run: npm run typecheck

      - name: Build (client + server)
        run: npm run build

      # Deploy validation, run on every PR and push to main. `--dry-run`
      # bundles the Worker and validates wrangler.jsonc + every binding
      # WITHOUT contacting Cloudflare, so it needs no account secrets. It
      # fails the check if the config breaks, the bundle won't build, or a
      # Durable Object binding references a class the migrations don't
      # create — catching deploy breakage at PR time, in our own CI,
      # independent of Cloudflare's preview build (which red-flags DO
      # migrations for reasons unrelated to correctness; see CLAUDE.md).
      - name: Validate deploy (wrangler dry-run)
        run: npx wrangler deploy --dry-run --outdir /tmp/deploy-dryrun
