name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (client + server)
        run: npm run typecheck

      - name: Build (client + server)
        run: npm run build
